name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-packages
      - name: Isolation check
        run: uv run python scripts/check_isolation.py
      - name: Cassette secret scan
        run: uv run python scripts/check_cassettes.py
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Tests (cassettes replayed; no API key)
        run: uv run pytest -q

  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - name: Each portfolio build must resolve standalone
        run: |
          set -euo pipefail
          shopt -s nullglob
          # nullglob strips projects/s*/ when it matches nothing, but
          # projects/capstone/ is a literal and survives even when absent —
          # so filter to real directories rather than trusting the array.
          found=0
          for build in projects/s*/ projects/capstone/; do
            [ -d "$build" ] || continue
            found=1
            echo "::group::$build"
            ( cd "$build" && uv sync && uv run pytest -q )
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "no portfolio builds yet — nothing to verify"
          fi

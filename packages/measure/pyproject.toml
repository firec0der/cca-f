[project]
name = "measure"
version = "0.1.0"
description = "Measurement scaffolding for the CCA Tier 1 labs. The lab bench, not the experiment."
requires-python = ">=3.12"
dependencies = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/measure"]
